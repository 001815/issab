<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <style>
        .calculator {
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .display {
            width: 90%;
            height: 40px;
            margin-bottom: 20px;
            padding: 10px;
            font-size: 24px;
            text-align: right;
        }
        .button {
            width: 50px;
            height: 40px;
            margin: 5px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" class="display" id="display" disabled>
        <div>
            <button class="button" onclick="clearDisplay()">C</button>
            <button class="button" onclick="backspace()">DEL</button>
            <button class="button" onclick="memoryClear()">MC</button>
            <button class="button" onclick="memoryRecall()">MR</button>
        </div>
        <div>
            <button class="button" onclick="append('7')">7</button>
            <button class="button" onclick="append('8')">8</button>
            <button class="button" onclick="append('9')">9</button>
            <button class="button" onclick="append('/')">/</button>
            <button class="button" onclick="sqrt()">√</button>
        </div>
        <div>
            <button class="button" onclick="append('4')">4</button>
            <button class="button" onclick="append('5')">5</button>
            <button class="button" onclick="append('6')">6</button>
            <button class="button" onclick="append('*')">*</button>
            <button class="button" onclick="percent()">%</button>
        </div>
        <div>
            <button class="button" onclick="append('1')">1</button>
            <button class="button" onclick="append('2')">2</button>
            <button class="button" onclick="append('3')">3</button>
            <button class="button" onclick="append('-')">-</button>
            <button class="button" onclick="memoryAdd()">M+</button>
        </div>
        <div>
            <button class="button" onclick="append('0')">0</button>
            <button class="button" onclick="append('.')">.</button>
            <button class="button" onclick="calculate()">=</button>
            <button class="button" onclick="append('+')">+</button>
            <button class="button" onclick="memorySubtract()">M-</button>
        </div>
    </div>

    <script>
        let displayValue = '';
        let memory = 0;

        function append(value) {
            displayValue += value;
            document.getElementById('display').value = displayValue;
        }

        function clearDisplay() {
            displayValue = '';
            document.getElementById('display').value = displayValue;
        }

        function backspace() {
            displayValue = displayValue.slice(0, -1);
            document.getElementById('display').value = displayValue;
        }

        function calculate() {
            try {
                let result = eval(displayValue);
                document.getElementById('display').value = result;
                displayValue = result.toString();
            } catch (error) {
                document.getElementById('display').value = 'Error';
                displayValue = '';
            }
        }

        function sqrt() {
            try {
                let result = Math.sqrt(eval(displayValue));
                document.getElementById('display').value = result;
                displayValue = result.toString();
            } catch (error) {
                document.getElementById('display').value = 'Error';
                displayValue = '';
            }
        }

        function percent() {
            try {
                let result = eval(displayValue) / 100;
                document.getElementById('display').value = result;
                displayValue = result.toString();
            } catch (error) {
                document.getElementById('display').value = 'Error';
                displayValue = '';
            }
        }

        function memoryAdd() {
            memory += eval(displayValue);
            clearDisplay();
        }

        function memorySubtract() {
            memory -= eval(displayValue);
            clearDisplay();
        }

        function memoryRecall() {
            displayValue = memory.toString();
            document.getElementById('display').value = displayValue;
        }

        function memoryClear() {
            memory = 0;
        }
    </script>
</body>
</html>
